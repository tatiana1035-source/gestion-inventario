# =====================================================
# Configuraci\u00f3n de la aplicaci\u00f3n - Inventario
# Framework: Spring Boot 3
# Base de datos: MySQL Workbench
# =====================================================

# --- Servidor ---
server.port=8080

# --- Conexi\u00f3n a MySQL ---
# Cambia 'stocklogistic2' por el nombre que creaste en MySQL Workbench
spring.datasource.url=jdbc:mysql://localhost:3306/stocklogistic2?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Pinina2005*
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuraci\u00f3n de Hibernate / JPA ---
# create-drop: borra y recrea las tablas al iniciar (\u00fatil en desarrollo)
# update: actualiza el esquema sin borrar datos
# validate: solo valida sin modificar
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en consola (\u00fatil para depuraci\u00f3n)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- Thymeleaf (motor de plantillas HTML) ---
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8

# --- Mensajes de error detallados (solo en desarrollo) ---
server.error.include-message=always
