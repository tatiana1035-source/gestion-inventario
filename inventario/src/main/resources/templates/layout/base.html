<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión de Inventario</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }
        .sidebar .nav-link {
            color: #a0aec0;
            border-radius: 8px;
            margin: 2px 0;
            transition: all 0.2s;
        }
        .sidebar .nav-link:hover, .sidebar .nav-link.active {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
        }
        .sidebar .nav-link i { margin-right: 8px; }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
        .alert-stock { border-left: 4px solid #f6c23e; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">

        <!-- Barra lateral de navegación -->
        <div class="col-md-2 sidebar p-3">
            <div class="text-white mb-4 mt-2">
                <h5><i class="bi bi-boxes"></i> Inventario</h5>
                <small class="text-muted">Sistema de Gestión</small>
            </div>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-speedometer2"></i>Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/productos"><i class="bi bi-box-seam"></i>Productos</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/categorias"><i class="bi bi-tag"></i>Categorías</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/proveedores"><i class="bi bi-truck"></i>Proveedores</a>
                </li>
            </ul>
        </div>

        <!-- Contenido principal -->
        <div class="col-md-10 p-4">

            <!-- Mensajes de éxito o error -->
            <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${mensajeExito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${mensajeError}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${mensajeError}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Contenido de cada página se inserta aquí -->
            <div th:replace="${content}">
                <!-- Las vistas hijas reemplazan este bloque -->
            </div>

        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
