<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo} + ' - Inventario'">Producto - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        .sidebar .nav-link { color: #a0aec0; border-radius: 8px; margin: 2px 0; }
        .sidebar .nav-link:hover { color: #fff; background-color: rgba(255,255,255,0.1); }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <div class="text-white mb-4 mt-2">
                <h5><i class="bi bi-boxes"></i> Inventario</h5>
            </div>
            <ul class="nav flex-column">
                <li><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link active" href="/productos"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
                <li><a class="nav-link" href="/categorias"><i class="bi bi-tag me-2"></i>Categorías</a></li>
                <li><a class="nav-link" href="/proveedores"><i class="bi bi-truck me-2"></i>Proveedores</a></li>
            </ul>
        </div>

        <!-- Contenido -->
        <div class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-4">
                <a href="/productos" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <div>
                    <h4 class="mb-0" th:text="${titulo}">Producto</h4>
                    <small class="text-muted">Complete todos los campos requeridos (*)</small>
                </div>
            </div>

            <!-- Error de negocio -->
            <div th:if="${mensajeError}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>
                <span th:text="${mensajeError}"></span>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <!--
                        Formulario Thymeleaf:
                        - th:object: enlaza el formulario con el objeto 'producto'
                        - th:action: URL dinámica según si es nuevo o edición
                        - th:field: enlaza cada campo con la propiedad del objeto
                        - th:errors: muestra errores de validación por campo

                        FIX: La categoría y el proveedor se envían como IDs separados
                        (name="categoriaId" y name="proveedorId") para evitar el
                        LazyInitializationException que ocurría con th:field="*{categoria.idCategoria}"
                        cuando Hibernate no había cargado la relación LAZY.
                    -->
                    <form th:action="${producto.idProducto == null} ? '/productos/guardar' : '/productos/actualizar/' + ${producto.idProducto}"
                          th:object="${producto}"
                          method="post">

                        <div class="row g-3">
                            <!-- Código del producto -->
                            <div class="col-md-4">
                                <label class="form-label">Código (SKU)</label>
                                <input type="text" class="form-control"
                                       th:field="*{codigoProducto}"
                                       placeholder="Ej: PROD-001">
                            </div>

                            <!-- Nombre del producto (obligatorio) -->
                            <div class="col-md-8">
                                <label class="form-label">Nombre del producto *</label>
                                <input type="text"
                                       th:field="*{nombre}"
                                       th:class="${#fields.hasErrors('nombre')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="Nombre del producto">
                                <div class="invalid-feedback" th:errors="*{nombre}"></div>
                            </div>

                            <!-- Descripción -->
                            <div class="col-12">
                                <label class="form-label">Descripción</label>
                                <textarea class="form-control" th:field="*{descripcion}"
                                          rows="2" placeholder="Descripción opcional del producto"></textarea>
                            </div>

                            <!-- Precio -->
                            <div class="col-md-4">
                                <label class="form-label">Precio *</label>
                                <div class="input-group">
                                    <span class="input-group-text">$</span>
                                    <input type="number" step="0.01" min="0.01"
                                           th:field="*{precio}"
                                           th:class="${#fields.hasErrors('precio')} ? 'form-control is-invalid' : 'form-control'"
                                           placeholder="0.00">
                                    <div class="invalid-feedback" th:errors="*{precio}"></div>
                                </div>
                            </div>

                            <!-- Stock actual -->
                            <div class="col-md-4">
                                <label class="form-label">Stock actual *</label>
                                <input type="number" min="0"
                                       th:field="*{stock}"
                                       th:class="${#fields.hasErrors('stock')} ? 'form-control is-invalid' : 'form-control'"
                                       placeholder="0">
                                <div class="invalid-feedback" th:errors="*{stock}"></div>
                            </div>

                            <!-- Stock mínimo -->
                            <div class="col-md-4">
                                <label class="form-label">Stock mínimo</label>
                                <input type="number" min="0"
                                       th:field="*{stockMinimo}"
                                       class="form-control"
                                       placeholder="5">
                                <small class="text-muted">Alerta cuando el stock llegue a este valor</small>
                            </div>

                            <!--
                                FIX Bug #1: Categoría enviada como name="categoriaId" (no th:field)
                                Esto evita que Thymeleaf intente acceder a categoria.idCategoria
                                a través del proxy LAZY de Hibernate, lo que causaba el crash.
                            -->
                            <div class="col-md-6">
                                <label class="form-label">Categoría *</label>
                                <select name="categoriaId" class="form-select">
                                    <option value="">-- Seleccione una categoría --</option>
                                    <option th:each="cat : ${categorias}"
                                            th:value="${cat.idCategoria}"
                                            th:text="${cat.nombre}"
                                            th:selected="${producto.categoria != null and producto.categoria.idCategoria == cat.idCategoria}">
                                    </option>
                                </select>
                            </div>

                            <!-- Proveedor (opcional) -->
                            <div class="col-md-6">
                                <label class="form-label">Proveedor</label>
                                <select name="proveedorId" class="form-select">
                                    <option value="">-- Sin proveedor asignado --</option>
                                    <option th:each="prov : ${proveedores}"
                                            th:value="${prov.idProveedor}"
                                            th:text="${prov.nombre}"
                                            th:selected="${producto.proveedor != null and producto.proveedor.idProveedor == prov.idProveedor}">
                                    </option>
                                </select>
                            </div>
                        </div>

                        <!-- Botones de acción -->
                        <div class="d-flex gap-2 mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-2"></i>Guardar producto
                            </button>
                            <a href="/productos" class="btn btn-outline-secondary">
                                <i class="bi bi-x-lg me-2"></i>Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
