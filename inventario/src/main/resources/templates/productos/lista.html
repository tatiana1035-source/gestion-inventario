<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        .sidebar .nav-link { color: #a0aec0; border-radius: 8px; margin: 2px 0; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: rgba(255,255,255,0.1); }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <!-- Sidebar -->
        <div class="col-md-2 sidebar p-3">
            <div class="text-white mb-4 mt-2">
                <h5><i class="bi bi-boxes"></i> Inventario</h5>
            </div>
            <ul class="nav flex-column">
                <li><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link active" href="/productos"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
                <li><a class="nav-link" href="/categorias"><i class="bi bi-tag me-2"></i>Categorías</a></li>
                <li><a class="nav-link" href="/proveedores"><i class="bi bi-truck me-2"></i>Proveedores</a></li>
            </ul>
        </div>

        <!-- Contenido -->
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h4 class="mb-0">Productos</h4>
                    <small class="text-muted">Gestión del inventario de productos</small>
                </div>
                <a href="/productos/nuevo" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-2"></i>Nuevo Producto
                </a>
            </div>

            <!-- Mensaje de éxito -->
            <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i>
                <span th:text="${mensajeExito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Buscador -->
            <div class="card mb-3">
                <div class="card-body">
                    <form action="/productos/buscar" method="get" class="d-flex gap-2">
                        <input type="text" name="nombre" class="form-control"
                               placeholder="Buscar por nombre..."
                               th:value="${busqueda}">
                        <button type="submit" class="btn btn-outline-primary">
                            <i class="bi bi-search"></i>
                        </button>
                        <a href="/productos" class="btn btn-outline-secondary">
                            <i class="bi bi-x-lg"></i>
                        </a>
                    </form>
                </div>
            </div>

            <!-- Tabla de productos -->
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Código</th>
                                <th>Nombre</th>
                                <th>Categoría</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Proveedor</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Thymeleaf: iterar la lista de productos -->
                            <tr th:each="p, stat : ${productos}"
                                th:class="${p.stockBajo} ? 'table-warning' : ''">
                                <td th:text="${stat.count}"></td>
                                <td>
                                    <code th:text="${p.codigoProducto ?: '-'}"></code>
                                </td>
                                <td>
                                    <strong th:text="${p.nombre}"></strong>
                                    <!-- Indicador de stock bajo -->
                                    <span th:if="${p.stockBajo}"
                                          class="badge bg-warning text-dark ms-1">
                                        <i class="bi bi-exclamation-triangle"></i> Stock bajo
                                    </span>
                                </td>
                                <td>
                                    <span class="badge bg-secondary"
                                          th:text="${p.categoria?.nombre ?: '-'}"></span>
                                </td>
                                <td>
                                    <!-- Formato de moneda con Thymeleaf -->
                                    <span th:text="${'$' + #numbers.formatDecimal(p.precio, 1, 2)}"></span>
                                </td>
                                <td>
                                    <span th:class="${p.stock <= p.stockMinimo} ? 'text-danger fw-bold' : ''"
                                          th:text="${p.stock}"></span>
                                </td>
                                <td th:text="${p.proveedor?.nombre ?: '-'}"></td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/productos/detalle/{id}(id=${p.idProducto})}"
                                           class="btn btn-outline-info" title="Ver detalle">
                                            <i class="bi bi-eye"></i>
                                        </a>
                                        <a th:href="@{/productos/editar/{id}(id=${p.idProducto})}"
                                           class="btn btn-outline-primary" title="Editar">
                                            <i class="bi bi-pencil"></i>
                                        </a>
                                        <a th:href="@{/productos/eliminar/{id}(id=${p.idProducto})}"
                                           class="btn btn-outline-danger"
                                           title="Eliminar"
                                           onclick="return confirm('¿Está seguro de eliminar este producto?')">
                                            <i class="bi bi-trash"></i>
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            <!-- Mensaje cuando no hay productos -->
                            <tr th:if="${productos.isEmpty()}">
                                <td colspan="8" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                    No se encontraron productos.
                                    <a href="/productos/nuevo">Agregar el primero</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                <div class="card-footer text-muted small"
                     th:text="${productos.size() + ' producto(s) encontrado(s)'}">
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
