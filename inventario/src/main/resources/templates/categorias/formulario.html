<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titulo} + ' - Inventario'">Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        .sidebar .nav-link { color: #a0aec0; border-radius: 8px; margin: 2px 0; }
        .sidebar .nav-link:hover { color: #fff; background-color: rgba(255,255,255,0.1); }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <div class="text-white mb-4 mt-2"><h5><i class="bi bi-boxes"></i> Inventario</h5></div>
            <ul class="nav flex-column">
                <li><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link" href="/productos"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
                <li><a class="nav-link active" href="/categorias"><i class="bi bi-tag me-2"></i>Categorías</a></li>
                <li><a class="nav-link" href="/proveedores"><i class="bi bi-truck me-2"></i>Proveedores</a></li>
            </ul>
        </div>
        <div class="col-md-10 p-4">
            <div class="d-flex align-items-center gap-2 mb-4">
                <a href="/categorias" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i></a>
                <h4 class="mb-0" th:text="${titulo}">Categoría</h4>
            </div>
            <div th:if="${mensajeError}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i><span th:text="${mensajeError}"></span>
            </div>
            <div class="card" style="max-width: 600px;">
                <div class="card-body p-4">
                    <form th:action="${categoria.idCategoria == null} ? '/categorias/guardar' : '/categorias/actualizar/' + ${categoria.idCategoria}"
                          th:object="${categoria}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nombre *</label>
                            <input type="text"
                                   th:field="*{nombre}"
                                   th:class="${#fields.hasErrors('nombre')} ? 'form-control is-invalid' : 'form-control'"
                                   placeholder="Nombre de la categoría">
                            <div class="invalid-feedback" th:errors="*{nombre}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción</label>
                            <textarea class="form-control" th:field="*{descripcion}"
                                      rows="3" placeholder="Descripción opcional"></textarea>
                        </div>
                        <div class="d-flex gap-2 pt-3 border-top">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-save me-2"></i>Guardar
                            </button>
                            <a href="/categorias" class="btn btn-outline-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
