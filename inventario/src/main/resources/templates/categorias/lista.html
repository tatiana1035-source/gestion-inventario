<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías - Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); }
        .sidebar .nav-link { color: #a0aec0; border-radius: 8px; margin: 2px 0; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: rgba(255,255,255,0.1); }
        .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-radius: 12px; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 sidebar p-3">
            <div class="text-white mb-4 mt-2"><h5><i class="bi bi-boxes"></i> Inventario</h5></div>
            <ul class="nav flex-column">
                <li><a class="nav-link" href="/"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a class="nav-link" href="/productos"><i class="bi bi-box-seam me-2"></i>Productos</a></li>
                <li><a class="nav-link active" href="/categorias"><i class="bi bi-tag me-2"></i>Categorías</a></li>
                <li><a class="nav-link" href="/proveedores"><i class="bi bi-truck me-2"></i>Proveedores</a></li>
            </ul>
        </div>
        <div class="col-md-10 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4 class="mb-0">Categorías</h4>
                <a href="/categorias/nueva" class="btn btn-primary">
                    <i class="bi bi-plus-lg me-2"></i>Nueva Categoría
                </a>
            </div>
            <div th:if="${mensajeExito}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle me-2"></i><span th:text="${mensajeExito}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div class="card">
                <div class="card-body p-0">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr><th>#</th><th>Nombre</th><th>Descripción</th><th>Acciones</th></tr>
                        </thead>
                        <tbody>
                            <tr th:each="c, stat : ${categorias}">
                                <td th:text="${stat.count}"></td>
                                <td><strong th:text="${c.nombre}"></strong></td>
                                <td th:text="${c.descripcion ?: '-'}"></td>
                                <td>
                                    <div class="btn-group btn-group-sm">
                                        <a th:href="@{/categorias/editar/{id}(id=${c.idCategoria})}"
                                           class="btn btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                        <a th:href="@{/categorias/eliminar/{id}(id=${c.idCategoria})}"
                                           class="btn btn-outline-danger"
                                           onclick="return confirm('¿Eliminar esta categoría?')">
                                            <i class="bi bi-trash"></i></a>
                                    </div>
                                </td>
                            </tr>
                            <tr th:if="${categorias.isEmpty()}">
                                <td colspan="4" class="text-center text-muted py-4">
                                    <i class="bi bi-inbox fs-4 d-block mb-2"></i>
                                    No hay categorías registradas.
                                    <a href="/categorias/nueva">Crear la primera</a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
